<!DOCTYPE html>
<html>

<head>
  <title>Rock Paper Scissors</title>
</head>

<body>

  <p>-----------------------------------------</p>
  <p>Rock Paper Scissors</p>

  <button onclick="
  
  playGame('rock');


 ">Rock</button>

  <button onclick="; 

  playGame('paper');

">Paper</button>


  <button onclick="

  playGame('scissors');

">Scissors</button>

  <button onclick="

  playGame('clear')
">
    clear score
  </button>

  <script>
    
    
    let score = JSON.parse(localStorage.getItem('score')) || {
        win : 0,
        lose : 0,
        tie : 0
      };


    


    function playGame(pick) {
      let result = '';
      const computerMove = computerMoveCheck();

      if (pick === 'rock') {
        if (computerMove === 'rock') {
          result = 'tie';
        } else if (computerMove === 'paper') {
          result = 'u lose';
        } else {
          result = 'u Win';
        }

      } else if (pick === 'paper') {
        if (computerMove === 'rock') {
          result = 'u win';
        } else if (computerMove === 'paper') {
          result = 'tie';
        } else {
          result = 'u lose';
        }
      } else if (pick === 'clear') {
        score.win = 0;
        score.lose = 0;
        score.tie = 0;
        localStorage.removeItem('score');
      } else {
        if (computerMove === 'rock') {
          result = 'u lose';

        }
        else if (computerMove === 'paper') {
          result = 'u win';

        }
        else {
          result = 'tie';

        }
      }
      if (result === 'u win') {
        score.win += 1;
      } else if (result === 'u lose') {
        score.lose += 1;
      } else if (result === 'tie') {
        score.tie += 1;
      } else {

      }

      
      localStorage.setItem('score', JSON.stringify(score));
      
      let scoreDisplay = (
        `Win = ${score.win}  Lose = ${score.lose}  Tie = ${score.tie}`);


      let winDisplay = `you pick ${pick} the computer pick ${computerMove}. ${result} 
${scoreDisplay}`;

      if (pick !== 'clear') {
        alert(winDisplay);
      } else
        alert(`u cleared the score:
${scoreDisplay}`)
      
    }




    function computerMoveCheck() {
      let computerMove = '';
      const random = Math.random();

      if (random >= 0 && random < 1 / 3) {

        computerMove = 'rock';
      }
      else if (random > 1 / 3 && random < 2 / 3) {
        computerMove = 'paper'
      }
      else {
        computerMove = 'scissors';
      }
      return computerMove;
    }


  </script>
