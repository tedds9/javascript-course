<body>


  <script>

    convertLength(5, 'lbs', 'lbs');
    function convertLength(length, from , to) {

      if(from === 'miles' && to === 'km') {
        km = length * 1.6;
        console.log(`${km} km`);
      }else if (from === 'km' && to === 'miles') {
        miles = length / 1.6;
        console.log(`${miles} miles`);
      }else if (from === 'miles' && to === 'ft') {
        ft = length * 5280;
        console.log(`${ft} ft`);
      }else if (from === 'km' && to === 'ft') {
        ft = length * 3281;
        console.log(`${ft} ft`);
      }else if (from === 'km' && to === 'km') {
        console.log(`${length} km`)
      }
      else {
        return console.log(`invalid unit:${from}`);
      }
    }




  </script>
