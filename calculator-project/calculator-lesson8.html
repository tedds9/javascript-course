<!DOCTYPE html>
<html>

<head>

</head>

<body>
  <p>----------------------------------------</p>
  <p>Calculator</p>
  <button class="buttonClick" onclick="updateCalculation('1')">
    1
  </button>
  <button class="buttonClick" onclick="updateCalculation('2')">
    2
  </button>
  <button class="buttonClick" onclick="updateCalculation('3')">
    3
  </button>
  <button class="buttonClick" onclick="updateCalculation('+')">
    +
  </button>

  <p></p>

  <button class="buttonClick" onclick="updateCalculation('4')">
    4
  </button>
  <button class="buttonCLick" onclick="updateCalculation('5');">
    5
  </button>
  <button class="buttonClick" onclick="updateCalculation('6');">
    6
  </button>
  <button class="buttonClick" onclick="updateCalculation('-');">
    -
  </button>

  <p></p>

  <button class="buttonClick" onclick="updateCalculation('7');">
    7
  </button>
  <button class="buttonClick"
   onclick=" 
   updateCalculation('8');
   ">8</button>

  <button class="buttonClick" onclick="updateCalculation('9')">9</button>
  <button class="buttonClick" onclick="updateCalculation('*'); ">
    *
  </button>

  <p></p>

  <button class="buttonClick" onclick="updateCalculation('0'); ">0</button>
  <button class="buttonClick" onclick="updateCalculation('.')">.</button>

  <button class="buttonClick" onclick="
  calculation = eval(calculation);
  console.log(calculation); 
  calculation = calculation.toString();
  updateCalculation('');
  ">
    =
  </button>
  <button class="buttonClick" onclick="updateCalculation('/');
  ">/</button>

  <p></p>

  <button class="buttonClick" onclick="
    calculation = '';
    updateCalculation('');
    textDisplay.innerHTML;

  ">clear</button>

  <p class="textdisplay"></p>

  <script>
    
  
    
    let calculation = JSON.parse(localStorage.getItem('last')) || 0;

      

  let textDisplay = 
    document.querySelector('.textdisplay');

    function updateCalculation(o) {

    console.log(typeof textDisplay.innerHTML);
        calculation += o;  

        textDisplay.innerHTML = calculation;
      localStorage.setItem('last', 
    JSON.stringify(calculation));
    }
  
  



  </script>
</body>

</html>
