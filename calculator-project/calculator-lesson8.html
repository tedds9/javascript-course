    calculation = '';

  <script>
    
    let calculation = JSON.parse(localStorage.getItem('last'));

    if (calculation === null) {
      calculation = '';
    }

    function updateCalculation(o) {
        calculation += o;  
      console.log(calculation);
      localStorage.setItem('last', 
    JSON.stringify(calculation));
